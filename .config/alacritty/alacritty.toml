[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[window]
padding = { x = 10, y = 10 }
dynamic_padding = true
opacity = 0.65

[colors.primary]
foreground = "#fbb0d7"
background = "#000000"

[colors.normal]
black   = "#090618"
red     = "#c34043"
green   = "#76946a"
yellow   = "#c0a36e"
blue    = "#7e9cd8"
magenta = "#957fb8"
cyan    = "#6a9589"
white   = "#c8c093"

[colors.bright]
black   = "#727169"
red     = "#e82424"
green   = "#98bb6c"
yellow  = "#e6c384"
blue    = "#7fb4ca"
magenta = "#938aa9"
cyan    = "#7aa89f"
white   = "#dcd7ba"

[cursor]
style = "Beam"
blink_interval = 500

[scrolling]
history = 10000

[keyboard]
bindings = [
    { key = "Return", mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0", mods = "Control", action = "ResetFontSize" }
]

